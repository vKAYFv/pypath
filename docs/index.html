<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyPath — Курс Python с нуля</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<!-- Pyodide — настоящий CPython в браузере -->




<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d0d0f;
  --bg2:        #111114;
  --bg3:        #18181c;
  --border:     #2a2a30;
  --border2:    #353540;
  --text:       #e8e8f0;
  --text2:      #9090a8;
  --text3:      #5a5a72;
  --accent:     #f7c948;
  --accent2:    #e8a020;
  --green:      #3dd68c;
  --green2:     #1a6640;
  --red:        #f25f5c;
  --blue:       #5b9cf6;
  --purple:     #a78bfa;
  --radius:     10px;
  --font-mono:  'JetBrains Mono', monospace;
  --font-head:  'Unbounded', sans-serif;
  --font-body:  'Inter', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── LAYOUT ───────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ──────────────────────────────────────────── */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
}

.sidebar-logo {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-top: 2px;
}

/* Progress bar */
.progress-wrap {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-bottom: 8px;
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* Module list */
.module-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.module-list::-webkit-scrollbar { width: 4px; }
.module-list::-webkit-scrollbar-track { background: transparent; }
.module-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.module-item {
  padding: 10px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  user-select: none;
}

.module-item:hover { background: var(--bg3); }

.module-item.active {
  background: var(--bg3);
  border-left-color: var(--accent);
}

.module-item.done .module-num { background: var(--green2); color: var(--green); }
.module-item.locked { opacity: 0.4; cursor: not-allowed; }

.module-num {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  flex-shrink: 0;
  transition: all 0.15s;
}

.module-item.active .module-num {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.module-info { flex: 1; min-width: 0; }

.module-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.module-item.active .module-title { color: var(--accent); }

.module-meta {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-top: 1px;
}

.module-check {
  color: var(--green);
  font-size: 14px;
  flex-shrink: 0;
}

/* ── MAIN CONTENT ─────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Tabs */
.tabs {
  display: flex;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  padding: 0 24px;
  flex-shrink: 0;
}

.tab {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: var(--font-mono);
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-spacer { flex: 1; }

.module-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  padding: 4px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
}

/* Content panels */
.content { flex: 1; overflow: hidden; display: flex; }

.panel {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 36px 48px;
}

.panel::-webkit-scrollbar { width: 6px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.panel.active { display: block; }

/* ── THEORY PANEL ─────────────────────────────────────── */
.theory-header {
  margin-bottom: 32px;
}

.theory-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.theory-title {
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
}

.theory-desc {
  margin-top: 10px;
  color: var(--text2);
  font-size: 15px;
}

.theory-body { max-width: 720px; }

.theory-body h2 {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin: 36px 0 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.3px;
}

.theory-body h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin: 24px 0 10px;
  font-family: var(--font-mono);
}

.theory-body p {
  color: var(--text2);
  margin-bottom: 14px;
  line-height: 1.75;
}

.theory-body ul, .theory-body ol {
  padding-left: 20px;
  margin-bottom: 14px;
  color: var(--text2);
}

.theory-body li { margin-bottom: 6px; line-height: 1.7; }

.theory-body code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
}

.theory-body pre {
  margin: 20px 0;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
}

.code-dots { display: flex; gap: 6px; }
.code-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}
.code-dot:nth-child(1) { background: #ff5f57; }
.code-dot:nth-child(2) { background: #ffbd2e; }
.code-dot:nth-child(3) { background: #28c840; }

.copy-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text3);
  padding: 3px 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.copy-btn:hover { border-color: var(--accent); color: var(--accent); }

.theory-body pre code {
  display: block;
  padding: 18px 20px;
  background: #1a1b26;
  font-size: 13.5px;
  line-height: 1.7;
  overflow-x: auto;
  border: none;
}

.tip-box {
  background: rgba(247, 201, 72, 0.06);
  border: 1px solid rgba(247, 201, 72, 0.2);
  border-left: 3px solid var(--accent);
  padding: 14px 18px;
  border-radius: var(--radius);
  margin: 20px 0;
  font-size: 14px;
  color: var(--text2);
}

.tip-box strong { color: var(--accent); }

/* ── TASKS PANEL ──────────────────────────────────────── */
.tasks-panel { padding: 0 !important; }
.tasks-panel.active { display: flex !important; }

.tasks-left {
  width: 380px;
  min-width: 380px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 24px;
}

.tasks-left::-webkit-scrollbar { width: 4px; }
.tasks-left::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.tasks-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.task-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.task-card:hover { border-color: var(--border2); }
.task-card.active { border-color: var(--accent); background: rgba(247,201,72,0.04); }
.task-card.solved { border-color: var(--green2); }

.task-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.task-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 4px;
}

.task-card.active .task-num { border-color: var(--accent); color: var(--accent); }
.task-card.solved .task-num { border-color: var(--green2); color: var(--green); }

.task-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}

.task-stars {
  font-size: 11px;
  color: var(--accent);
}

.task-desc {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
}

.task-status {
  font-size: 12px;
  color: var(--green);
  margin-top: 6px;
  font-family: var(--font-mono);
}

/* Editor area */
.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.editor-filename {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text2);
}

.editor-filename span { color: var(--accent); }

.run-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: #000;
  border: none;
  padding: 8px 18px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.run-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.run-btn:active { transform: translateY(0); }
.run-btn svg { width: 14px; height: 14px; }

.check-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  color: var(--green);
  border: 1px solid var(--green2);
  padding: 8px 16px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-right: 8px;
  display: none;
}
.check-btn:hover { background: rgba(61,214,140,0.08); border-color: var(--green); }
.check-btn.visible { display: flex; }

.reset-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  padding: 8px 14px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-right: 8px;
}

.reset-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(247,201,72,0.06);
}

.editor-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #1a1b26;
}

.code-editor-shell {
  display: flex;
  width: 100%;
  height: 100%;
}

.editor-gutter {
  width: 56px;
  flex-shrink: 0;
  background: #161722;
  border-right: 1px solid var(--border);
  color: #5f6480;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.7;
  text-align: right;
  padding: 20px 10px 20px 6px;
  overflow: hidden;
  user-select: none;
  font-variant-numeric: tabular-nums;
}

.line-num {
  display: block;
  min-height: 1.7em;
}

.editor-code-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#editor-highlight {
  position: absolute;
  inset: 0;
  margin: 0;
  padding: 20px;
  overflow: auto;
  pointer-events: none;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.7;
  tab-size: 4;
  white-space: pre;
}

#editor-highlight code {
  display: block;
  min-height: 100%;
}

#code-editor {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  color: transparent;
  caret-color: #c0caf5;
  border: none;
  outline: none;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.7;
  padding: 20px;
  resize: none;
  overflow: auto;
  tab-size: 4;
  white-space: pre;
}

#code-editor::placeholder {
  color: #6f7391;
}

#code-editor::selection {
  background: rgba(91, 156, 246, 0.35);
}

/* Output */
.output-panel {
  height: 200px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.output-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

.output-title {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.output-status {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
}

.output-status.idle { color: var(--text3); background: var(--bg3); }
.output-status.running { color: var(--blue); background: rgba(91,156,246,0.1); }
.output-status.ok { color: var(--green); background: rgba(61,214,140,0.1); }
.output-status.err { color: var(--red); background: rgba(242,95,92,0.1); }

#output-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}

#output-content::-webkit-scrollbar { width: 4px; }
#output-content::-webkit-scrollbar-thumb { background: var(--border2); }

.out-line { display: block; }
.out-line.success { color: var(--green); }
.out-line.error { color: var(--red); }
.out-line.info { color: var(--blue); }
.out-line.test-pass { color: var(--green); }
.out-line.test-fail { color: var(--red); }

/* ── PROGRESS PANEL ───────────────────────────────────── */
.progress-panel { max-width: 800px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}

.stat-value {
  font-family: var(--font-head);
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
}

.modules-progress { }

.prog-section-title {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.3px;
}

.module-prog-item {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.module-prog-name {
  width: 200px;
  font-size: 13px;
  color: var(--text2);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.module-prog-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.module-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #2af598);
  border-radius: 3px;
  transition: width 0.8s ease;
}

.module-prog-pct {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text3);
  width: 40px;
  text-align: right;
}

/* ── NOTIFICATIONS ────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1000;
  max-width: 320px;
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green2); color: var(--green); }
.toast.error { border-color: #5a1a1a; color: var(--red); }

/* ── CONFETTI ─────────────────────────────────────────── */
.confetti-piece {
  position: fixed;
  width: 8px;
  height: 8px;
  pointer-events: none;
  z-index: 9999;
  animation: confetti-fall 1.5s ease-in forwards;
}

@keyframes confetti-fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── SCROLLBAR global ─────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 900px) {
  .sidebar { width: 220px; min-width: 220px; }
  .panel { padding: 24px; }
  .tasks-left { width: 300px; min-width: 300px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">PyPath</div>
      <div class="logo-sub">// курс Python с нуля</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Прогресс</span>
        <span id="prog-text">0 / 10</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="module-list" id="module-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TABS -->
    <div class="tabs">

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  document.querySelectorAll('.panel').forEach(panel => {
    panel.classList.remove('active');
  });

  const target = document.getElementById(`panel-${tab}`);

  if (tab === 'progress') renderProgress();
}

async function copyCode(btn) {
  const codeEl = btn.closest('pre')?.querySelector('code');
  if (!codeEl) return;
  const text = codeEl.textContent || '';

  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'copied';
    setTimeout(() => { btn.textContent = 'copy'; }, 1200);
  } catch (_) {
    // Fallback for restrictive clipboard contexts.
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (_) {}
    document.body.removeChild(ta);
    btn.textContent = 'copied';
    setTimeout(() => { btn.textContent = 'copy'; }, 1200);
  }
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  if (!toast) return;

  toast.textContent = message;
  toast.className = 'toast';
  if (type) toast.classList.add(type);
  toast.classList.add('show');

  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2200);
}

function updateProgressBar() {
  const stats = getProgressStats();
  const totalTasks = stats.totalTasks;

  const pct = totalTasks > 0 ? Math.round(solvedTasks/totalTasks*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${solvedTasks} / ${totalTasks}`;
  renderProgress();
}

function getProgressStats() {
  let totalTasks = 0;
  let solvedTasks = 0;
  let completedModules = 0;
  const modules = MODULES.map(mod => {
    const total = mod.tasks.length;
    const solved = mod.tasks.filter((_, i) => isSolved(mod.id, i)).length;
    const pct = total > 0 ? Math.round((solved / total) * 100) : 0;
    if (total > 0 && solved === total) completedModules++;
    totalTasks += total;
    solvedTasks += solved;
    return {
      id: mod.id,
      title: mod.title,
      total,
      solved,
      pct
    };
  });

  return {
    totalTasks,
    solvedTasks,
    completedModules,
    modules
  };
}

  const statsGrid = document.getElementById('stats-grid');
  const modulesList = document.getElementById('modules-progress-list');
  if (!statsGrid || !modulesList) return;

  const stats = getProgressStats();
  const pct = stats.totalTasks > 0 ? Math.round((stats.solvedTasks / stats.totalTasks) * 100) : 0;

  const cards = [
    { value: `${stats.solvedTasks}`, label: 'Решено задач' },
    { value: `${stats.totalTasks}`, label: 'Всего задач' },

      <div class="stat-label">${card.label}</div>

  modulesList.innerHTML = stats.modules.map(mod => `

function pushBatchedLines(store, chunk, isErr) {
  chunk.split(/\r?\n/).forEach(line => {
    if (line !== '') store.push({ t: line, err: isErr });
  });
}

function extractReadableError(err) {
  const raw = (err && err.message) ? err.message : String(err);
  const lines = raw.split('\n').filter(l => l.trim().length > 0);
  const filtered = lines.filter(l =>
    !l.trim().startsWith('PythonError:') &&
    l.trim() !== 'The above exception was the direct cause of the following exception:'
  );
  const source = (filtered.length ? filtered : lines).map(l => l.replace(/^PythonError:\s*/, ''));
  return source.slice(-6);
}

function appendErrorGuidance(errorLines) {
  const text = errorLines.join('\n');
  if (/TabError|IndentationError/.test(text)) {
    appendOutput('// Подсказка: используй только 4 пробела для отступов, без смешивания tabs/spaces.', 'info');
  } else if (/SyntaxError/.test(text)) {
    appendOutput('// Подсказка: проверь двоеточия, скобки и кавычки в строке с ошибкой.', 'info');

}

function escapeHtml(text) {
  return text

    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

function normalizeCodeForExecution(code) {
  const cleaned = code.replace(/\u00a0/g, ' ').replace(/\r\n/g, '\n');
  let hadTabIndent = false;
  const normalized = cleaned.split('\n').map(line => {
    const lead = line.match(/^[ \t]+/);
    if (!lead) return line;
    if (lead[0].includes('\t')) hadTabIndent = true;
    return lead[0].replace(/\t/g, '    ') + line.slice(lead[0].length);
  }).join('\n');
  return { code: normalized, hadTabIndent };
}

function getPreparedEditorCode() {
  const editor = document.getElementById('code-editor');
  const source = editor ? editor.value : '';
  const prepared = normalizeCodeForExecution(source);
  const changed = source !== prepared.code;
  if (changed && editor) {
    const caret = editor.selectionStart;
    editor.value = prepared.code;
    editor.selectionStart = editor.selectionEnd = Math.min(caret, editor.value.length);
    renderEditorDecorations();
  }
  return { code: prepared.code, normalizedTabs: prepared.hadTabIndent && changed };
}

function getIndentRemoveCount(line) {
  if (line.startsWith('\t')) return 1;
  const spaces = line.match(/^ {1,4}/);
  return spaces ? spaces[0].length : 0;
}

function indentSelection(editor) {
  const value = editor.value;
  const s = editor.selectionStart;
  const e = editor.selectionEnd;

  if (s === e) {
    editor.value = value.slice(0, s) + '    ' + value.slice(e);
    editor.selectionStart = editor.selectionEnd = s + 4;
    renderEditorDecorations();
    return;
  }

  const lineStart = value.lastIndexOf('\n', s - 1) + 1;
  const selected = value.slice(lineStart, e);
  const indented = selected.replace(/^/gm, '    ');
  editor.value = value.slice(0, lineStart) + indented + value.slice(e);
  editor.selectionStart = s + 4;
  editor.selectionEnd = e + (indented.length - selected.length);
  renderEditorDecorations();
}

function outdentSelection(editor) {
  const value = editor.value;
  const s = editor.selectionStart;
  const e = editor.selectionEnd;

  if (s === e) {
    const lineStart = value.lastIndexOf('\n', s - 1) + 1;
    const lineEnd = value.indexOf('\n', s);
    const endPos = lineEnd === -1 ? value.length : lineEnd;
    const line = value.slice(lineStart, endPos);
    const remove = getIndentRemoveCount(line);
    if (!remove) return;
    editor.value = value.slice(0, lineStart) + line.slice(remove) + value.slice(endPos);
    const newPos = Math.max(lineStart, s - remove);
    editor.selectionStart = editor.selectionEnd = newPos;
    renderEditorDecorations();
    return;
  }

  const lineStart = value.lastIndexOf('\n', s - 1) + 1;
  const selected = value.slice(lineStart, e);
  const lines = selected.split('\n');
  let removedTotal = 0;
  let removedFirst = 0;
  const outdented = lines.map((line, idx) => {
    const remove = getIndentRemoveCount(line);
    if (idx === 0) removedFirst = remove;
    removedTotal += remove;
    return line.slice(remove);
  }).join('\n');

  editor.value = value.slice(0, lineStart) + outdented + value.slice(e);
  const firstOffset = Math.max(0, s - lineStart);
  editor.selectionStart = s - Math.min(removedFirst, firstOffset);
  editor.selectionEnd = e - removedTotal;
  renderEditorDecorations();
}

function insertNewlineWithIndent(editor) {
  const value = editor.value;
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const lineStart = value.lastIndexOf('\n', s - 1) + 1;
  const beforeCursor = value.slice(lineStart, s);
  const currentIndent = (beforeCursor.match(/^[ \t]*/) || [''])[0].replace(/\t/g, '    ');
  const trimmed = beforeCursor.trimEnd();
  const extraIndent = trimmed.endsWith(':') ? '    ' : '';
  const insert = '\n' + currentIndent + extraIndent;

  editor.value = value.slice(0, s) + insert + value.slice(e);
  const pos = s + insert.length;
  editor.selectionStart = editor.selectionEnd = pos;
  renderEditorDecorations();
}

function appendBeginnerHintForNone(code, lines) {
  const hasPass = /\bpass\b/.test(code);
  if (!hasPass) return;
  const nonErrorLines = lines.filter(l => !l.err).map(l => l.t.trim()).filter(Boolean);
  if (nonErrorLines.length > 0 && nonErrorLines.every(l => l === 'None')) {
    appendOutput('// Подсказка: функция с pass возвращает None. Замени pass на return с ответом.', 'info');
  }
}

function setupCodeEditor() {
  const editor = document.getElementById('code-editor');
  if (!editor) return;
  editor.addEventListener('input', renderEditorDecorations);
  editor.addEventListener('scroll', syncEditorScroll);
  window.addEventListener('resize', syncEditorScroll);
  renderEditorDecorations();
}

function clearOutput() {
  document.getElementById('output-content').innerHTML =
    '<span class="out-line info">// Нажми ▶ Запустить  (Ctrl+Enter)</span>';
  setStatus('idle', 'idle');
}

function setStatus(cls, text) {
  const el = document.getElementById('output-status');
  el.className = 'output-status ' + cls;
  el.textContent = text;
}

function appendOutput(text, cls) {
  cls = cls || '';
  const el = document.getElementById('output-content');
  if (el.querySelector('.info')) el.innerHTML = '';
  const line = document.createElement('span');
  line.className = 'out-line ' + cls;
  line.textContent = text;
  el.appendChild(line);
  el.appendChild(document.createElement('br'));
  el.scrollTop = el.scrollHeight;
}

async function runPythonCode(code, filename) {
  const outLines = [];
  pyodide.setStdout({ batched: (s) => pushBatchedLines(outLines, s, false) });
  pyodide.setStderr({ batched: (s) => pushBatchedLines(outLines, s, true) });

  pyodide.globals.set('__pypath_code__', code);
  pyodide.globals.set('__pypath_filename__', filename || '<student_code>');

  try {
    await pyodide.runPythonAsync(
`_pypath_ns = {"__name__": "__main__"}
exec(compile(__pypath_code__, __pypath_filename__, "exec"), _pypath_ns, _pypath_ns)`
    );
    return { lines: outLines, error: null };
  } catch (error) {
    return { lines: outLines, error };
  } finally {
    pyodide.globals.delete('__pypath_code__');
    pyodide.globals.delete('__pypath_filename__');
  }
}

async function runCode() {
  if (!pyodide) { appendOutput('⏳ Python ещё загружается...', 'info'); return; }
  if (executionInProgress) { appendOutput('⏳ Дождись завершения текущего запуска.', 'info'); return; }

  const prepared = getPreparedEditorCode();
  const code = prepared.code;
  if (!code.trim()) { appendOutput('⚠️ Введи код для запуска.', 'info'); return; }

  document.getElementById('output-content').innerHTML = '';
  setStatus('running', 'running...');
  setExecutionState(true);
  if (prepared.normalizedTabs) {
    appendOutput('// Отступы с tab автоматически заменены на 4 пробела.', 'info');
  }

  try {
    const result = await runPythonCode(code, 'student_run.py');
    result.lines.forEach(l => appendOutput(l.t, l.err ? 'error' : ''));

    if (result.error) {
      const errLines = extractReadableError(result.error);
      errLines.forEach(line => appendOutput(line, 'error'));
      appendErrorGuidance(errLines);
      setStatus('err', 'error');
      return;
    }

    if (result.lines.length === 0) appendOutput('// Код выполнен без вывода', 'info');
    appendBeginnerHintForNone(code, result.lines);
    const hasErr = result.lines.some(l => l.err);
    setStatus(hasErr ? 'err' : 'ok', hasErr ? 'error' : 'done');
    // Автовалидация отключена — используй кнопку "Проверить"
  } catch (e) {
    const errLines = extractReadableError(e);
    errLines.forEach(line => appendOutput(line, 'error'));
    appendErrorGuidance(errLines);
    setStatus('err', 'error');
  } finally {
    setExecutionState(false);
  }
}

// ── VALIDATION ─────────────────────────────────────────
function runValidation(code) {
  const mod = MODULES[STATE.currentModule];
  if (STATE.currentTask === null || !mod.tasks[STATE.currentTask]) {
    appendOutput('⚠️ Сначала выбери задачу слева.', 'info');
    return null;
  }

  const taskIdx = STATE.currentTask;
  const task = mod.tasks[taskIdx];
  const fnName = task.name.replace('()', '');
  const tests = getTaskTests(fnName);
  if (!tests) {
    appendOutput('⚠️ Для этой задачи пока нет автопроверки.', 'error');
    setStatus('err', 'no tests');
    return null;
  }

  const marker = `__PYPATH_CHECK_END__${Date.now()}`;
  return {
    mod,
    taskIdx,
    marker,
    fullCode: `${code}\n${tests}\nprint("${marker}")`
  };
}

async function runCheck() {
  if (!pyodide) { appendOutput('⏳ Python ещё загружается...', 'info'); return; }
  if (executionInProgress) { appendOutput('⏳ Дождись завершения текущего запуска.', 'info'); return; }
  const prepared = getPreparedEditorCode();
  const code = prepared.code;
  if (!code.trim()) { appendOutput('⚠️ Введи код для проверки.', 'info'); return; }

  document.getElementById('output-content').innerHTML = '';
  setStatus('running', 'checking...');
  setExecutionState(true);
  if (prepared.normalizedTabs) {
    appendOutput('// Отступы с tab автоматически заменены на 4 пробела.', 'info');
  }

  try {
    const payload = runValidation(code);
    if (!payload) return;
    await runTestsAsync(payload.fullCode, payload.mod, payload.taskIdx, payload.marker);
  } finally {
    setExecutionState(false);
  }
}

async function runTestsAsync(fullCode, mod, taskIdx, marker) {
  try {
    const result = await runPythonCode(fullCode, 'student_check.py');
    const pureLines = result.lines
      .map(l => l.t.trim())
      .filter(l => l && l !== marker);

    if (result.error) {
      const errLines = extractReadableError(result.error);
      errLines.forEach(line => appendOutput(line, 'error'));
      appendErrorGuidance(errLines);
      setStatus('err', 'error');
      return;
    }

    const checkResult = pureLines.length ? pureLines[pureLines.length - 1] : '';
    if (checkResult === 'ALL_PASS') {
      appendOutput('══════════════════════', 'success');
      appendOutput('✓  Все тесты пройдены!', 'success');
      appendOutput('══════════════════════', 'success');
      setStatus('ok', 'passed');
      markSolved(mod.id, taskIdx);
      buildSidebar();
      renderTasks();
      showToast('✓ Задача решена!', 'success');
      confetti();
    } else {
      // Показываем нормальную ошибку
      const msg = checkResult || 'Тесты не вернули результат — проверь, что функция что-то возвращает.';
      appendOutput('✗  ' + msg, 'error');
      setStatus('err', 'failed');
    }
  } catch(e) {
    // Python exception во время теста
    const errLines = extractReadableError(e);
    errLines.forEach(line => appendOutput(line, 'error'));
    appendErrorGuidance(errLines);
    setStatus('err', 'error');
  }
}

// ── CONFETTI ───────────────────────────────────────────
function confetti() {
  const colors = ['#f7c948','#3dd68c','#5b9cf6','#a78bfa','#f25f5c','#ff9f43'];
  for (let i = 0; i < 40; i++) {
    setTimeout(function() {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = Math.random()>0.5?'50%':'2px';
      el.style.animationDuration = (1+Math.random())+'s';
      el.style.animationDelay = Math.random()*0.3+'s';
      document.body.appendChild(el);
      setTimeout(function(){ el.remove(); }, 2000);
    }, i*30);
  }
}

// ── KEYBOARD ───────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); runCode();
    return;
  }

  const editor = document.getElementById('code-editor');
  if (document.activeElement !== editor) return;

  if (e.key === 'Tab') {
    e.preventDefault();
    if (e.shiftKey) outdentSelection(editor);
    else indentSelection(editor);
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    insertNewlineWithIndent(editor);
    return;
  }
});
